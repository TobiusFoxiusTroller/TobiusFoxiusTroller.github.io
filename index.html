  <!-- CSS for Rouxls Kaard theatrical theme -->
  <style>
    body {
      background: linear-gradient(to bottom, #FF0000, #FF00FF); /* chaotic stage lights */
      color: #FF00FF; 
      background:
        radial-gradient(circle at 20% 20%, rgba(136, 183, 255, 0.35), transparent 45%),
        radial-gradient(circle at 80% 15%, rgba(255, 227, 138, 0.22), transparent 40%),
        linear-gradient(160deg, #0f2f8f 0%, #1f115f 55%, #090321 100%); /* royal blue + shadowy violet like Rouxls' outfit */
      color: #f7d875;
      font-family: 'Papyrus', sans-serif;
      text-align: center;  
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      font-family: 'Papyrus', cursive, sans-serif; /* dramatic flair */
      color: #2375FF;
      text-shadow: 3px 3px #ff99ff; /* glowing effect */
      color: #8fc0ff;
      text-shadow: 3px 3px #2b1f8f; /* glowing effect */
      font-size: 3em;
      animation: wiggle 1s infinite alternate; /* Rouxls chaos */
    }

    p {
      font-size: 18px;
      line-height: 1.5;
      color: #fdf2c1;
      text-shadow: 1px 1px #140938;
      animation: wiggle 1s infinite alternate;
    }

    img {
      max-width: 80%;
      height: auto;
      border: 5px dotted #FFFFFF;
      box-shadow: 0 0 25px #ff99ff;
      margin-top: 20px;
      animation: wiggle 1s infinite alternate-reverse;
    }

    @keyframes wiggle {
      0% { transform: rotate(-2deg); }
      100% { transform: rotate(2deg); }
    }
  </style>
</head>
<body>

  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Armour Download</title>
  
  <style>
    /* This CSS turns your link into a real button */
    .download-btn {
      display: inline-block;
      background-color: #007bff;   /* Button background color */
      color: #ffffff;              /* Text color */
      padding: 12px 24px;          /* Button sizing/spacing */
      font-size: 16px;             /* Text size */
      font-family: Arial, sans-serif;
      text-decoration: none;       /* Removes the text underline */
      border-radius: 5px;          /* Rounds the corners */
      font-weight: bold;           /* Makes text thick */
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Adds a subtle shadow */
      transition: background 0.2s ease;     /* Smooth hover effect */
      cursor: pointer;
    }

    /* Change color when user hovers over the button */
    .download-btn:hover {
      background-color: #0056b3;
    }
    
    /* Slightly shrinks when clicked to look like a real press */
    .download-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <!-- The Button Structure -->
  <a href="TemArmour.png" download="TemArmour.png" class="download-btn">
    Download Armour Image
  </a>

</body>
</html>
