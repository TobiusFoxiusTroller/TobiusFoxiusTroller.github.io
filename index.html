  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEM SHOP</title>
  
  <!-- CSS for Rouxls Kaard theatrical theme -->
  <style>
    body {
      background: linear-gradient(to bottom, #FF0000, #FF00FF); /* chaotic stage lights */
      color: #FF00FF; 
      background:
        radial-gradient(circle at 20% 20%, rgba(136, 183, 255, 0.35), transparent 45%),
        radial-gradient(circle at 80% 15%, rgba(255, 227, 138, 0.22), transparent 40%),
        linear-gradient(160deg, #0f2f8f 0%, #1f115f 55%, #090321 100%); /* royal blue + shadowy violet like Rouxls' outfit */
      color: #f7d875;
      font-family: 'Papyrus', sans-serif;
      text-align: center;  
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      font-family: 'Papyrus', cursive, sans-serif; /* dramatic flair */
      color: #2375FF;
      text-shadow: 3px 3px #ff99ff; /* glowing effect */
      color: #8fc0ff;
      text-shadow: 3px 3px #2b1f8f; /* glowing effect */
      font-size: 3em;
      animation: wiggle 1s infinite alternate; /* Rouxls chaos */
    }

    p {
      font-size: 18px;
      line-height: 1.5;
      color: #fdf2c1;
      text-shadow: 1px 1px #140938;
      animation: wiggle 1s infinite alternate;
    }

    img {
      max-width: 80%;
      height: auto;
      border: 5px dotted #FFFFFF;
      box-shadow: 0 0 25px #ff99ff;
      margin-top: 20px;
      animation: wiggle 1s infinite alternate-reverse;
    }

    @keyframes wiggle {
      0% { transform: rotate(-2deg); }
      100% { transform: rotate(2deg); }
    }
  </style>
</head>
<body>

  <h1>Hoi!</h1>
  <p>Im temmie (not) </p>
  <p> How did you find me</p>
  <p> Welp heres a tem armour i guess</p>
